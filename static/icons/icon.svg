<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#0E2A3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1722;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="512" height="512" fill="url(#bg-gradient)" />

  <!-- Stylized sea bass emblem: refined, geometric, premium nautical mark -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Outer compass ring (subtle brass circle) -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#C9A24B" stroke-width="3" opacity="0.6" />
    <circle cx="0" cy="0" r="132" fill="none" stroke="#E7D8B8" stroke-width="1" opacity="0.4" />

    <!-- Bass silhouette: geometric, minimal, confident -->
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="85" ry="55" fill="#C9A24B" />

    <!-- Head (refined triangle-like) -->
    <path d="M 60 -15 L 95 0 L 60 15 Z" fill="#C9A24B" />

    <!-- Dorsal fin (double-sail minimal mark) -->
    <path d="M -20 -55 L -10 -30 L 0 -50 L 10 -30 L 20 -55 Q 0 -60 -20 -55" fill="#C9A24B" opacity="0.9" />

    <!-- Tail fin (split, geometric) -->
    <path d="M -70 -25 L -110 -45 L -100 0 L -110 45 L -70 25 Z" fill="#C9A24B" />

    <!-- Pectoral fin accent (subtle sand highlight) -->
    <path d="M -30 25 L -50 35 L -45 28 Z" fill="#E7D8B8" opacity="0.7" />

    <!-- Eye (brass with sand iris) -->
    <circle cx="75" cy="-8" r="6" fill="#E7D8B8" />
    <circle cx="76" cy="-8" r="3" fill="#0A1722" />

    <!-- Lateral stripe (nautical detail, subtle sand line) -->
    <line x1="-40" y1="0" x2="50" y2="0" stroke="#E7D8B8" stroke-width="2" opacity="0.6" stroke-linecap="round" />
  </g>

  <!-- Decorative corner anchors (minimal, tasteful) -->
  <g opacity="0.3" stroke="#C9A24B" stroke-width="2" stroke-linecap="round" fill="none">
    <path d="M 20 20 L 35 20 M 20 20 L 20 35" />
    <path d="M 492 20 L 477 20 M 492 20 L 492 35" />
    <path d="M 20 492 L 35 492 M 20 492 L 20 477" />
    <path d="M 492 492 L 477 492 M 492 492 L 492 477" />
  </g>
</svg>
