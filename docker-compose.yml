# Déploiement via Dokploy (type "Compose").
# Le reverse proxy + HTTPS (Let's Encrypt) sont gérés par le Traefik de Dokploy :
# dans l'UI, attache un domaine au service "app" sur le port 3000 et active HTTPS.
# Le service rejoint le réseau "dokploy-network" pour être routable par Traefik
# (sinon un 404 « no router » est renvoyé même si le conteneur tourne).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      # ORIGIN : ton domaine HTTPS final (OBLIGATOIRE pour adapter-node : URLs/CSRF).
      # Défini dans l'onglet Environment de Dokploy.
      - ORIGIN=${ORIGIN}
      # Derrière le proxy Traefik de Dokploy :
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      # Base SQLite persistée sur un volume (survit aux redéploiements) :
      - DATABASE_PATH=/data/data.sqlite
      # Photos de prises stockées à côté de la base, sur le même volume persistant :
      - UPLOADS_PATH=/data/uploads
      # adapter-node limite le corps des requêtes à 512 Ko par défaut : on relève la
      # limite pour autoriser l'upload d'une photo (cap applicatif : 10 Mo).
      - BODY_SIZE_LIMIT=12M
    volumes:
      - baryeu-data:/data
    expose:
      - "3000"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true

volumes:
  baryeu-data:
